<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1600"
    height="1000"
    viewBox="0 0 1600 1000"
    role="img"
    aria-labelledby="title description"
>
    <title id="title">Tijdelijke afbeelding van een Volvo-vrachtwagen</title>
    <desc id="description">
        Donkere tijdelijke afbeelding totdat een gelicenseerde foto is toegevoegd.
    </desc>

    <defs>
        <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0f172a" />
            <stop offset="100%" stop-color="#1e293b" />
        </linearGradient>
    </defs>

    <rect width="1600" height="1000" fill="url(#background)" />

    <g fill="none" stroke="#38bdf8" stroke-width="22">
        <rect x="280" y="410" width="580" height="270" rx="28" />
        <path d="M860 480h210l170 200H860z" />
        <path d="M1070 480v200" />
        <path d="M270 680h1000" />
        <circle cx="480" cy="730" r="95" />
        <circle cx="1050" cy="730" r="95" />
    </g>

    <text
        x="800"
        y="260"
        fill="#f8fafc"
        font-family="Arial, sans-serif"
        font-size="68"
        font-weight="700"
        text-anchor="middle"
    >
        VOLVO-TIJDREIS
    </text>

    <text
        x="800"
        y="875"
        fill="#94a3b8"
        font-family="Arial, sans-serif"
        font-size="34"
        text-anchor="middle"
    >
        Definitieve historische foto volgt
    </text>
</svg>